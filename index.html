<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>TrustAware Diagnostics Portal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Splash Screen -->
    <div id="splash">
        <h1>🩺 TrustAware Diagnostics Portal</h1>
        <p>Prediction with Confidence, Reliability & Error Analysis</p>
    </div>

    <!-- Main Menu -->
    <div id="menu" style="display:none;">
        <button onclick="showDataset()">Detection by Dataset</button>
        <button onclick="showImage()">Detection by Image (Coming Soon)</button>
        <button onclick="showDashboard()">View Dashboard</button>
    </div>

    <!-- Sections -->
    <div id="dataset" class="section" style="display:none;">
        <h2>Upload Dataset</h2>
        <input type="file" id="csvFile" accept=".csv">
        <button onclick="runDiagnosis()">Run Diagnosis</button>
        <div id="result"></div>
    </div>

    <div id="image" class="section" style="display:none;">
        <h2>Image Detection</h2>
        <p>📷 Coming Soon...</p>
    </div>

    <div id="dashboard" class="section" style="display:none;">
        <h2>Patient Results Dashboard</h2>
        <div id="dashboardTable"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
